<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pricing — Accountable</title>
  <meta name="description" content="One price. No surprises. Every Accountable plan includes a 14-day free trial. No credit card required." />
  <link rel="icon" type="image/png" href="assets/logo-mark-black.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/theme.css" />
  <link rel="stylesheet" href="src/sections.css" />
  <link rel="stylesheet" href="src/heroes.css" />
  <link rel="stylesheet" href="src/pricing.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body data-theme="light">
  <div id="root"></div>
  <script type="text/babel" src="src/sections.jsx"></script>
  <script type="text/babel" src="src/pricing.jsx"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;
    function App() {
      const [theme, setTheme] = useState("light");
      useEffect(() => {
        document.body.dataset.theme = theme;
        try { localStorage.setItem("at_theme", theme); } catch {}
      }, [theme]);
      useEffect(() => {
        try {
          const t = localStorage.getItem("at_theme");
          if (t === "light" || t === "dark") setTheme(t);
        } catch {}
      }, []);
      return (
        <>
          <Nav theme={theme} onThemeToggle={() => setTheme(theme === "dark" ? "light" : "dark")} page="pricing" />
          <PricingHero />
          <PlanCards />
          <ComparisonTable />
          <PricingFAQ />
          <PricingCTA />
          <Footer page="pricing" />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
